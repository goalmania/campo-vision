        <h1>DM Football Services — Software Gestionale Calcio | ClubIS &amp; DM Scout</h1>
        <p>DM Football Services è un'azienda italiana che sviluppa software gestionale e di scouting per club di calcio dilettantistici e semiprofessionistici italiani. I prodotti sono costruiti nativamente per il mercato italiano — non adattamenti di software stranieri — con integrazione diretta nei processi FIGC e LND.</p>
        <p>Due prodotti: <strong>ClubIS</strong> (gestionale completo per club di Eccellenza, Promozione e Serie D) e <strong>DM Scout</strong> (piattaforma di scouting professionale con intelligenza artificiale per scout, agenti FIFA e direttori sportivi).</p>
        <p>Contatti: <a href="mailto:info@dmfootballservices.it">info@dmfootballservices.it</a> | <a href="tel:+393334218596">+39 333 421 8596</a></p>

        <hr/>

        <h2>ClubIS — Gestionale Completo per Club di Calcio</h2>
        <p>ClubIS è il sistema di gestione integrato per club di calcio italiani di Eccellenza, Promozione e Serie D. Sostituisce fogli Excel, chat WhatsApp, Google Drive e PDF sparsi con un'unica piattaforma condivisa tra tutti i ruoli del club. È una Progressive Web App (PWA) accessibile da smartphone senza installazione.</p>

        <h3>11 Dashboard Role-Based</h3>
        <p>Ogni membro dello staff accede solo alle funzioni del proprio ruolo:</p>

        <h4>Dashboard Presidente</h4>
        <p>KPI esecutivi in tempo reale: ricavi, costi, margine operativo. Financial Fair Play secondo parametri FIGC. Compliance iscrizione campionato con checklist scadenze critiche. Gestione sponsor (gold/silver/bronze). Obiettivi stagionali (promozione, salvezza, posizione in classifica). Panoramica organigramma e stato staff.</p>

        <h4>Dashboard Segretario</h4>
        <p>Anagrafica completa tesserati con foto e documenti. Tesseramenti FIGC: definitivo, prestito, prova, svincolo con scadenziario automatico. Certificati medici con semaforo visivo (verde = valido, giallo = scade entro 30 giorni, rosso = scaduto). Distinte gara generate nel formato regolamentare FIGC con controllo squalifiche automatico. Quote iscrizione con piani rateali 2-12 rate e pagamento online. Rimborsi SEPA in batch: file XML pronto per la banca in un click. Analisi automatica Comunicati Ufficiali FIGC/LND: le squalifiche vengono applicate in 60 secondi invece di 30 minuti.</p>

        <h4>Dashboard Direttore Sportivo</h4>
        <p>Rosa completa con contratti, scadenze e ingaggi. Pipeline trattative mercato (entrate/uscite). Budget mercato e controllo spese trasferimenti. Financial Fair Play in tempo reale. Monitoraggio quote Under automatico. Accesso al database scouting integrato con DM Scout (piano Elite). Export PDF professionale del profilo giocatore.</p>

        <h4>Dashboard Allenatore</h4>
        <p>Disponibilità rosa in tempo reale: infortuni, squalifiche, indisponibilità aggiornati dal segretario e dal medico. Pianificazione microciclo settimanale. Presenze digitali agli allenamenti. Convocazioni con risposta dei giocatori in tempo reale. Valutazioni periodiche su tecnica/tattica/fisico/mentalità (visibili a DS e famiglie). Schema tattico interattivo drag-and-drop. Report post-partita.</p>

        <h4>Dashboard Osservatore</h4>
        <p>Report scouting standardizzati con voto e potenziale. Valutazione su attributi specifici con generazione Radar Chart. Archivio storico giocatori visionati. Condivisione immediata al DS. Mappa geografica osservazioni.</p>

        <h4>Dashboard Team Manager</h4>
        <p>Logistica trasferte (bus, hotel, pasti, costi). Calendario condiviso. Distinte gara in tempo reale. Accrediti gara per famiglie, sponsor, stampa. Inventario materiale tecnico.</p>

        <h4>Dashboard Medico / Fisioterapista</h4>
        <p>Cartella clinica digitale per ogni tesserato. Registro infortuni con tempi di recupero stimati. Registro terapie quotidiane. Alert automatici all'allenatore sull'idoneità al lavoro in campo. Prenotazione visite specialistiche.</p>

        <h4>Dashboard Giocatore</h4>
