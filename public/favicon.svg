<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Black background -->
  <rect width="100" height="100" fill="#000000"/>

  <!-- Left white square panel -->
  <rect x="4" y="12" width="52" height="76" rx="4" fill="#ffffff"/>

  <!-- Green M shape (bold angular M / checkmark + vertical) -->
  <polyline points="12,62 26,38 34,52 42,38 56,62" fill="none" stroke="#c8f135" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Vertical stem of the 1 -->
  <line x1="56" y1="30" x2="56" y2="70" stroke="#c8f135" stroke-width="9" stroke-linecap="round"/>

  <!-- Right black D / half-circle with target -->
  <path d="M56,18 Q96,18 96,50 Q96,82 56,82 Z" fill="#000000" stroke="#000000" stroke-width="1"/>

  <!-- Target circle outer -->
  <circle cx="72" cy="50" r="18" stroke="#ffffff" stroke-width="4" fill="none"/>
  <!-- Target circle inner -->
  <circle cx="72" cy="50" r="7" stroke="#ffffff" stroke-width="3" fill="none"/>
  <!-- Lime dot center -->
  <circle cx="72" cy="50" r="3.5" fill="#c8f135"/>
  <!-- Crosshair lines -->
  <line x1="72" y1="28" x2="72" y2="40" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="72" y1="60" x2="72" y2="72" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="62" y2="50" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="82" y1="50" x2="94" y2="50" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
</svg>
